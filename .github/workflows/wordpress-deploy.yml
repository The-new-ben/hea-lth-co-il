name: Hea-lth portal CI and production deploy

on:
  pull_request:
    paths:
      - '.github/workflows/wordpress-deploy.yml'
      - 'deploy/**'
      - 'plugin-src/**'
      - 'scripts/**'
      - 'theme-src/**'
      - 'tests/test_wordpress_pipeline.py'
      - '.gitleaks.toml'
      - 'tooling/php-quality/**'
      - 'tooling/web-quality/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/wordpress-deploy.yml'
      - 'deploy/**'
      - 'plugin-src/**'
      - 'scripts/**'
      - 'theme-src/**'
      - 'tests/test_wordpress_pipeline.py'
      - '.gitleaks.toml'
      - 'tooling/php-quality/**'
      - 'tooling/web-quality/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hea-lth-wordpress-production
  cancel-in-progress: false

env:
  PLATFORM_PACKAGE_NAME: hea-lth-platform-core
  PARENT_THEME_PACKAGE_NAME: hea-lth-portal
  CHILD_THEME_PACKAGE_NAME: hea-lth-portal-child
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  validate:
    name: Build and validate deterministic package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Show runtime versions
        run: |
          python3 --version
          php --version

      - name: Validate workflow syntax with checksum-pinned actionlint
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            --output /tmp/actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  /tmp/actionlint.tar.gz' | sha256sum --check
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          /tmp/actionlint .github/workflows/wordpress-deploy.yml

      - name: Scan the checked-out release for secrets
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            --output /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz' | sha256sum --check
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks dir --redact --no-banner --config .gitleaks.toml .

      - name: Compile deployment scripts
        run: python3 -m py_compile scripts/build-wordpress-package.py scripts/deploy-wordpress.py

      - name: Run deployment unit tests
        run: python3 -m unittest -v tests/test_wordpress_pipeline.py

      - name: Lint every PHP file
        run: find . -type f -name '*.php' -not -path './.git/*' -print0 | xargs -0 -n1 php -l

      - name: Install and audit pinned PHP quality tools
        working-directory: tooling/php-quality
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          composer audit

      - name: Enforce WordPress coding standards and static analysis
        working-directory: tooling/php-quality
        run: |
          vendor/bin/phpcs -p --standard=phpcs.xml.dist
          vendor/bin/phpstan analyse -c phpstan.neon.dist --no-progress --memory-limit=512M

      - name: Audit pinned web quality tools
        run: |
          npm ci --prefix tooling/web-quality --ignore-scripts
          npm audit --prefix tooling/web-quality --audit-level=moderate

      - name: Build twice and assert reproducibility
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          export SOURCE_DATE_EPOCH
          for package in "$PLATFORM_PACKAGE_NAME" "$PARENT_THEME_PACKAGE_NAME" "$CHILD_THEME_PACKAGE_NAME"; do
            first="$(python3 scripts/build-wordpress-package.py --package "$package")"
            first_sha="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["sha256"])' <<<"$first")"
            second="$(python3 scripts/build-wordpress-package.py --package "$package")"
            second_sha="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["sha256"])' <<<"$second")"
            test "$first_sha" = "$second_sha"
            echo "$package deterministic package SHA-256: $first_sha"
          done

      - name: Verify deployment inputs without network writes
        run: |
          python3 scripts/deploy-wordpress.py --package "$PLATFORM_PACKAGE_NAME" --dry-run
          python3 scripts/deploy-wordpress.py --package "$PARENT_THEME_PACKAGE_NAME" --dry-run
          python3 scripts/deploy-wordpress.py --package "$CHILD_THEME_PACKAGE_NAME" --dry-run

      - name: Upload validated release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hea-lth-portal-release-${{ github.sha }}
          path: |
            plugin-dist/hea-lth-platform-core-*.zip
            plugin-dist/hea-lth-platform-core-*.zip.sha256
            plugin-dist/hea-lth-platform-core.json
            plugin-dist/hea-lth-portal-*.zip
            plugin-dist/hea-lth-portal-*.zip.sha256
            plugin-dist/hea-lth-portal.json
            plugin-dist/hea-lth-portal-child-*.zip
            plugin-dist/hea-lth-portal-child-*.zip.sha256
            plugin-dist/hea-lth-portal-child.json
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Deploy, verify, and remove deployment route
    needs: validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://hea-lth.co.il
    env:
      WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
      WP_USER: ${{ secrets.WP_USER }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
    steps:
      - name: Check out the deployed revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Require all WordPress deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${WP_BASE_URL:?Missing WP_BASE_URL repository secret}"
          : "${WP_USER:?Missing WP_USER repository secret}"
          : "${WP_APP_PASSWORD:?Missing WP_APP_PASSWORD repository secret}"

      - name: Rebuild the exact validated package
        run: |
          SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          export SOURCE_DATE_EPOCH
          python3 scripts/build-wordpress-package.py --package "$PLATFORM_PACKAGE_NAME"
          python3 scripts/build-wordpress-package.py --package "$PARENT_THEME_PACKAGE_NAME"
          python3 scripts/build-wordpress-package.py --package "$CHILD_THEME_PACKAGE_NAME"

      - name: Deploy platform plugin with automatic rollback and route removal
        run: >-
          python3 scripts/deploy-wordpress.py
          --package "$PLATFORM_PACKAGE_NAME"
          --bootstrap-code-snippets
          --deployment-id "gh-${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

      - name: Install portal parent theme before the child theme activation
        run: >-
          python3 scripts/deploy-wordpress.py
          --package "$PARENT_THEME_PACKAGE_NAME"
          --bootstrap-code-snippets
          --deployment-id "gh-${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-parent"

      - name: Activate verified portal child theme with automatic rollback and route removal
        run: >-
          python3 scripts/deploy-wordpress.py
          --package "$CHILD_THEME_PACKAGE_NAME"
          --bootstrap-code-snippets
          --deployment-id "gh-${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-child"
